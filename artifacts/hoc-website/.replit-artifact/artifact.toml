kind = "web"
previewPath = "/"
title = "Hands On Creatives"
version = "1.0.0"
id = "artifacts/hoc-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22020

[services.development]
run = "pnpm --filter @workspace/hoc-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hoc-website", "run", "build" ]
publicDir = "artifacts/hoc-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22020"
BASE_PATH = "/"
